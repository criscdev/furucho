# ===========================================
# Furucho API - Test Configuration
# ===========================================
# This file shadows src/main/resources/application.properties
# during test execution. It replicates base settings and activates
# the "test" profile which loads application-test.properties overrides.

spring.profiles.active=test

# Application Info
spring.application.name=furucho-api

# ===========================================
# H2 In-Memory Database (test)
# ===========================================
spring.datasource.url=jdbc:h2:mem:furuchodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console disabled in tests
spring.h2.console.enabled=false

# JPA/Hibernate Settings (overridden by application-test.properties)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway disabled for tests (overridden by application-test.properties)
spring.flyway.enabled=false

# ===========================================
# Server Configuration
# ===========================================
server.port=0

# ===========================================
# Logging (quiet in tests)
# ===========================================
logging.level.com.robertafurucho=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# ===========================================
# Jackson (JSON) Configuration
# ===========================================
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false

# ===========================================
# WhatsApp Cloud API (disabled in tests)
# ===========================================
whatsapp.enabled=false
whatsapp.api.base-url=https://graph.facebook.com/v25.0
whatsapp.api.phone-number-id=test-phone-id
whatsapp.api.access-token=test-access-token
whatsapp.webhook.verify-token=test-verify-token
whatsapp.app-secret=test-app-secret
whatsapp.conversation.timeout-minutes=30
whatsapp.conversation.max-retries-per-field=3
whatsapp.notification.roberta-wa-id=5511999990000
