# ===========================================
# Furucho API - Test Properties (profile: test)
# ===========================================
# Activated by src/test/resources/application.properties.
# Overrides for H2 in-memory test execution.

# Disable Flyway (H2 cannot run PostgreSQL partial-index DDL)
spring.flyway.enabled=false

# Hibernate creates and drops schema automatically in tests
spring.jpa.hibernate.ddl-auto=create-drop
