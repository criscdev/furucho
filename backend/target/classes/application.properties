# ===========================================
# Furucho API - Application Properties
# ===========================================

# Application Info
spring.application.name=furucho-api

# ===========================================
# Development Profile (H2 Database)
# ===========================================
# H2 in-memory database for development
spring.datasource.url=jdbc:h2:mem:furuchodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# Server Configuration
# ===========================================
server.port=8080

# ===========================================
# Logging
# ===========================================
logging.level.com.robertafurucho=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===========================================
# Jackson (JSON) Configuration
# ===========================================
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false
