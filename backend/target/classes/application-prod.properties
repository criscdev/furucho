# ===========================================
# Furucho API - Production Profile
# ===========================================

# Application Info
spring.application.name=furucho-api

# ===========================================
# PostgreSQL Database Configuration
# ===========================================
# Use environment variables for sensitive data
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/furuchodb}
spring.datasource.username=${DATABASE_USERNAME:furucho}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 Console in production
spring.h2.console.enabled=false

# ===========================================
# Server Configuration
# ===========================================
server.port=${PORT:8080}

# ===========================================
# Logging (less verbose in production)
# ===========================================
logging.level.com.robertafurucho=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# ===========================================
# Jackson (JSON) Configuration
# ===========================================
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false
